idle_right:
  - [ RobotRightIdle1, 96 ]
  - [ RobotRightIdle2, 32 ]
idle_left:
  - [ RobotLeftIdle1, 96 ]
  - [ RobotLeftIdle2, 32 ]
idle_down:
  - [ RobotDownIdle1, 96 ]
  - [ RobotDownIdle2, 32 ]
idle_up:
  - [ RobotUpIdle1, 96 ]
  - [ RobotUpIdle2, 32 ]
move_right:
  - [ RobotRightMove2, 8 ]
  - [ RobotRightIdle1, 8 ]
move_left:
  - [ RobotLeftMove2, 8 ]
  - [ RobotLeftIdle1, 8 ]
move_down:
  - [ RobotDownMove2, 8 ]
  - [ RobotDownIdle1, 8 ]
move_up:
  - [ RobotUpMove2, 8 ]
  - [ RobotUpIdle1, 8 ]
exit_level:
  - [ ExitFrame1, 12 ]
  - { loop: [ "$y", 0, -3, -1 ], item: [ ExitFrame1, 12, { delta_y: "$y" } ] }
  - { loop: [ "$y", -3, 3, 1 ], item: [ ExitFrame1, 18, { delta_y: "$y" } ] }
  - { loop: [ "$y", 4, 8, 1 ], item: [ ExitFrame2, 12, { delta_y: "$y" } ] }
  - { loop: [ "$y", 8, 16, 1 ], item: [ ExitFrame3, 9, { delta_y: "$y" } ] }
